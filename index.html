<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamGrade — Трекер Сна</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;700&family=Space+Grotesk:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #0A0F1E;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
        }
        input[type=range] {
            accent-color: #4F46E5;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Эмуляция иконок через эмодзи для автономности
        const Shield = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>🛡️</span>;
        const Smartphone = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>📱</span>;
        const Sun = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>☀️</span>;
        const Coffee = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>☕</span>;
        const Moon = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>🌙</span>;
        const Thermometer = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>🌡️</span>;
        const Zap = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>⚡</span>;
        const Flame = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>🔥</span>;
        const Activity = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>📈</span>;
        const Target = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>🎯</span>;
        const AlertTriangle = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>⚠️</span>;
        const BarChart2 = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>📊</span>;
        const Wind = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>💨</span>;
        const Star = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>⭐</span>;
        const CheckSquare = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>✅</span>;
        const Square = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>⬜</span>;
        const Trophy = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>🏆</span>;
        const Lock = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>🔒</span>;
        const Bell = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>🔔</span>;
        const Eye = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>👁️</span>;
        const TrendingUp = ({ size = 16, style = {} }) => <span style={{ fontSize: size, ...style }}>📈</span>;

        // ТВОЙ КОД
        const MOCK_USER = {
            name: "Алекс", avatar: "АК", level: "Сновидец 5 уровня",
            currentXP: 3240, maxXP: 4000, streak: 12,
        };

        const MOCK_SLEEP = {
            totalHours: 7.4, deepSleepPct: 22, remPct: 18,
            awakenings: 2, score: 88, bedConsistency: 91,
            bedtime: "23:15", wakeTime: "06:42",
        };

        const HISTORY = [
            { day: "Пн", score: 72, hours: 6.5 },
            { day: "Вт", score: 81, hours: 7.1 },
            { day: "Ср", score: 65, hours: 5.9 },
            { day: "Чт", score: 88, hours: 7.8 },
            { day: "Пт", score: 79, hours: 7.0 },
            { day: "Сб", score: 91, hours: 8.2 },
            { day: "Вс", score: 88, hours: 7.4 },
        ];

        const ACHIEVEMENTS = [
            { id: 1, title: "Мастер Режима", desc: "Ложился спать в одно время 5 дней подряд", icon: Shield, earned: true, xp: 300 },
            { id: 2, title: "Цифровой Детокс", desc: "Нет телефона за 2 часа до сна", icon: Smartphone, earned: true, xp: 200 },
            { id: 3, title: "Ранняя Пташка", desc: "Просыпался до 7:00 семь дней подряд", icon: Sun, earned: false, xp: 250 },
            { id: 4, title: "Кофейный Стоп", desc: "Не пил кофе после 15:00 в течение недели", icon: Coffee, earned: false, xp: 150 },
            { id: 5, title: "Глубокий Погружатель", desc: "Достиг 25%+ глубокого сна", icon: Moon, earned: true, xp: 400 },
            { id: 6, title: "Температурный Мастер", desc: "Идеальная температура в спальне 5 ночей", icon: Thermometer, earned: false, xp: 200 },
        ];

        const QUESTS = [
            { id: 1, text: "Пройти 10 000 шагов", xp: 100, done: false },
            { id: 2, text: "Не пить кофе после 15:00", xp: 150, done: true },
            { id: 3, text: "Лечь спать до 23:30", xp: 200, done: false },
            { id: 4, text: "Медитация 10 минут перед сном", xp: 120, done: false },
            { id: 5, text: "Не использовать телефон после 22:00", xp: 180, done: true },
            { id: 6, text: "Проветрить комнату перед сном", xp: 80, done: false },
        ];

        function scoreColor(s) {
            if (s >= 85) return "#10B981";
            if (s >= 70) return "#F59E0B";
            return "#EF4444";
        }
        function scoreLabel(s) {
            if (s >= 85) return "Отлично";
            if (s >= 70) return "Хорошо";
            return "Плохо";
        }

        function CircularScore({ score }) {
            const r = 80, circ = 2 * Math.PI * r, color = scoreColor(score);
            return (
                <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "center", width: 220, height: 220 }}>
                    <svg width="220" height="220" style={{ position: "absolute", top: 0, left: 0 }}>
                        <circle cx="110" cy="110" r={r} fill="none" stroke="#1E293B" strokeWidth="14" />
                        <circle cx="110" cy="110" r={r} fill="none" stroke={color} strokeWidth="14"
                            strokeDasharray={circ} strokeDashoffset={circ * (1 - score / 100)}
                            strokeLinecap="round" transform="rotate(-90 110 110)"
                            style={{ transition: "stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)" }} />
                    </svg>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                        <span style={{ fontSize: 56, fontWeight: 700, color, fontFamily: "'DM Mono', monospace" }}>{score}</span>
                        <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: 2, color, opacity: 0.85 }}>{scoreLabel(score).toUpperCase()}</span>
                        <span style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>из 100</span>
                    </div>
                </div>
            );
        }

        function XPBar({ current, max }) {
            return (
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ flex: 1, height: 8, borderRadius: 9999, overflow: "hidden", background: "#1E293B" }}>
                        <div style={{ width: `${(current / max) * 100}%`, height: "100%", borderRadius: 9999, background: "linear-gradient(90deg, #4F46E5, #06B6D4)", transition: "width 1s ease" }} />
                    </div>
                    <span style={{ fontSize: 11, color: "#94a3b8", whiteSpace: "nowrap" }}>{current.toLocaleString()} / {max.toLocaleString()} XP</span>
                </div>
            );
        }

        function StatCard({ icon: Icon, label, value, sub, color = "#4F46E5" }) {
            return (
                <div style={{ background: "#161E35", border: "1px solid #1E293B", borderRadius: 16, padding: 16, display: "flex", flexDirection: "column", gap: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ background: `${color}22`, borderRadius: 8, padding: 6 }}><Icon size={16} style={{ color }} /></div>
                        <span style={{ fontSize: 11, color: "#64748b" }}>{label}</span>
                    </div>
                    <div style={{ fontSize: 24, fontWeight: 700, color: "#fff", fontFamily: "'DM Mono', monospace" }}>{value}</div>
                    {sub && <div style={{ fontSize: 11, color: "#64748b" }}>{sub}</div>}
                </div>
            );
        }

        function Toggle({ value, onChange, label }) {
            return (
                <button onClick={() => onChange(!value)} style={{ display: "flex", alignItems: "center", gap: 12, background: "none", border: "none", cursor: "pointer" }}>
                    <div style={{ position: "relative", width: 48, height: 24, borderRadius: 9999, background: value ? "#4F46E5" : "#1E293B", transition: "background 0.2s" }}>
                        <div style={{ position: "absolute", top: 4, width: 16, height: 16, borderRadius: "50%", background: "#fff", transform: value ? "translateX(26px)" : "translateX(4px)", transition: "transform 0.2s" }} />
                    </div>
                    {label && <span style={{ fontSize: 14, color: "#cbd5e1" }}>{label}</span>}
                </button>
            );
        }

        function Dashboard() {
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                    <div style={{ background: "#161E35", border: "1px solid #1E293B", borderRadius: 16, padding: 20, display: "flex", flexDirection: "column", gap: 16 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                            <div style={{ width: 56, height: 56, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 700, color: "#fff", background: "linear-gradient(135deg, #4F46E5, #06B6D4)" }}>{MOCK_USER.avatar}</div>
                            <div style={{ flex: 1 }}>
                                <div style={{ color: "#94a3b8", fontSize: 14 }}>С добрым утром,</div>
                                <div style={{ color: "#fff", fontSize: 20, fontWeight: 700 }}>{MOCK_USER.name}</div>
                                <div style={{ color: "#818cf8", fontSize: 12, marginTop: 2, display: "flex", alignItems: "center", gap: 4 }}>
                                    <Zap size={12} style={{ color: "#facc15" }} />{MOCK_USER.level}
                                </div>
                            </div>
                            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 4, color: "#fb923c", fontSize: 14, fontWeight: 600 }}>
                                    <Flame size={14} />{MOCK_USER.streak} дней
                                </div>
                                <div style={{ fontSize: 11, color: "#64748b" }}>подряд</div>
                            </div>
                        </div>
                        <XPBar current={MOCK_USER.currentXP} max={MOCK_USER.maxXP} />
                    </div>

                    <div style={{ background: "#161E35", border: "1px solid #1E293B", borderRadius: 16, padding: 24, display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
                        <div style={{ fontSize: 12, color: "#94a3b8", letterSpacing: 3, textTransform: "uppercase" }}>Рейтинг сна сегодня</div>
                        <CircularScore score={MOCK_SLEEP.score} />
                        <div style={{ display: "flex", gap: 24, textAlign: "center", width: "100%" }}>
                            {[["Отбой", MOCK_SLEEP.bedtime], ["Подъём", MOCK_SLEEP.wakeTime], ["Часов", MOCK_SLEEP.totalHours]].map(([label, val], i) => (
                                <div key={label} style={{ flex: 1, borderRight: i < 2 ? "1px solid #1e293b" : "none" }}>
                                    <div style={{ fontSize: 11, color: "#64748b" }}>{label}</div>
                                    <div style={{ color: "#fff", fontWeight: 600, fontSize: 14, fontFamily: "'DM Mono', monospace" }}>{val}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                        <StatCard icon={Moon} label="Глубокий сон" value={`${MOCK_SLEEP.deepSleepPct}%`} sub="Рекомендуется 20–25%" color="#4F46E5" />
                        <StatCard icon={Activity} label="REM сон" value={`${MOCK_SLEEP.remPct}%`} sub="Фаза быстрого сна" color="#06B6D4" />
                        <StatCard icon={Zap} label="Пробуждений" value={MOCK_SLEEP.awakenings} sub="Меньше — лучше" color="#F59E0B" />
                        <StatCard icon={Target} label="Стабильность" value={`${MOCK_SLEEP.bedConsistency}%`} sub="Регулярность отбоя" color="#10B981" />
                    </div>

                    <div style={{ background: "#1A1000", border: "1px solid #F59E0B44", borderRadius: 16, padding: 16, display: "flex", gap: 12 }}>
                        <AlertTriangle size={20} style={{ color: "#eab308", flexShrink: 0, marginTop: 2 }} />
                        <div>
                            <div style={{ color: "#facc15", fontWeight: 600, fontSize: 14, marginBottom: 4 }}>Обнаружен синий свет</div>
                            <div style={{ color: "#94a3b8", fontSize: 12, lineHeight: 1.6 }}>
                                Воздействие синего света после 22:00 зафиксировано. Уровень мелатонина снижен на 18%.
                                Очки опыта уменьшены на <span style={{ color: "#f87171", fontWeight: 600 }}>–50 XP</span>.
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Analytics() {
            const avg = Math.round(HISTORY.reduce((s, d) => s + d.score, 0) / HISTORY.length);
            const maxScore = Math.max(...HISTORY.map(d => d.score));
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                    <div style={{ background: "#161E35", border: "1px solid #1E293B", borderRadius: 16, padding: 20 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                            <div>
                                <div style={{ color: "#fff", fontWeight: 700 }}>История сна</div>
                                <div style={{ color: "#64748b", fontSize: 12 }}>Последние 7 дней</div>
                            </div>
                            <div style={{ textAlign: "right" }}>
                                <div style={{ fontSize: 24, fontWeight: 700, color: scoreColor(avg), fontFamily: "'DM Mono', monospace" }}>{avg}</div>
                                <div style={{ fontSize: 11, color: "#64748b" }}>средний балл</div>
                            </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 160 }}>
                            {HISTORY.map((d, i) => {
                                const isLast = i === HISTORY.length - 1;
                                const color = scoreColor(d.score);
                                return (
                                    <div key={d.day} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                                        <div style={{ fontSize: 11, color, fontFamily: "monospace" }}>{d.score}</div>
                                        <div style={{ flex: 1, width: "100%", display: "flex", alignItems: "flex-end" }}>
                                            <div style={{ width: "100%", height: `${(d.score / maxScore) * 100}%`, borderRadius: "4px 4px 0 0", background: isLast ? `linear-gradient(180deg, ${color}, ${color}88)` : `${color}55`, border: `1px solid ${isLast ? color + "88" : "transparent"}` }} />
                                        </div>
                                        <div style={{ fontSize: 11, color: "#64748b" }}>{d.day}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div>
                        <div style={{ color: "#fff", fontWeight: 700, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
                            <BarChart2 size={16} style={{ color: "#818cf8" }} />Анализ факторов
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                            {[
                                { icon: Smartphone, title: "Синий свет", value: "–12 pts", detail: "Использование экрана с 22:00 до 23:15. Подавление мелатонина на 18%.", color: "#4F46E5", bg: "#1A1000", border: "#F59E0B44", vc: "#F59E0B" },
                                { icon: Coffee, title: "Кофеин", value: "Норма", detail: "Последний кофе в 14:30 — кофеин не повлиял на качество сна.", color: "#10B981", bg: "#0D1F12", border: "#10B98144", vc: "#10B981" },
                                { icon: Thermometer, title: "Температура", value: "–8 pts", detail: "Температура 24°C. Идеальный диапазон: 18–20°C.", color: "#EF4444", bg: "#1A0808", border: "#EF444444", vc: "#EF4444" },
                                { icon: Wind, title: "Влажность", value: "Норма", detail: "Влажность 52% — в пределах нормы (40–60%).", color: "#06B6D4", bg: "#0D1F12", border: "#10B98144", vc: "#10B981" },
                            ].map(({ icon: Icon, title, value, detail, color, bg, border, vc }) => (
                                <div key={title} style={{ background: bg, border: `1px solid ${border}`, borderRadius: 16, padding: 16, display: "flex", gap: 16 }}>
                                    <div style={{ background: `${color}22`, borderRadius: 12, padding: 10, height: "fit-content" }}><Icon size={20} style={{ color }} /></div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                            <span style={{ color: "#fff", fontWeight: 600, fontSize: 14 }}>{title}</span>
                                            <span style={{ color: vc, fontWeight: 700, fontSize: 14 }}>{value}</span>
                                        </div>
                                        <p style={{ color: "#94a3b8", fontSize: 12, lineHeight: 1.6, margin: 0 }}>{detail}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function RPGView() {
            const [quests, setQuests] = useState(QUESTS);
            const toggle = (id) => setQuests(q => q.map(item => item.id === id ? { ...item, done: !item.done } : item));
            const earnedXP = quests.filter(q => q.done).reduce((s, q) => s + q.xp, 0);
            const totalXP = quests.reduce((s, q) => s + q.xp, 0);
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                    <div style={{ background: "#161E35", border: "1px solid #4F46E544", borderRadius: 16, padding: 20, position: "relative", overflow: "hidden" }}>
                        <div style={{ position: "absolute", inset: 0, opacity: 0.1, background: "radial-gradient(circle at 80% 50%, #4F46E5 0%, transparent 70%)" }} />
                        <div style={{ position: "relative", display: "flex", alignItems: "center", gap: 16 }}>
                            <div style={{ width: 64, height: 64, borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #4F46E5, #7C3AED)" }}>
                                <Star size={28} style={{ color: "#fff" }} />
                            </div>
                            <div style={{ flex: 1 }}>
                                <div style={{ color: "#94a3b8", fontSize: 12 }}>Текущий уровень</div>
                                <div style={{ color: "#fff", fontSize: 20, fontWeight: 700 }}>{MOCK_USER.level}</div>
                                <div style={{ color: "#818cf8", fontSize: 12, marginTop: 4 }}>{MOCK_USER.currentXP.toLocaleString()} XP заработано</div>
                            </div>
                        </div>
                        <div style={{ marginTop: 16 }}>
                            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#64748b", marginBottom: 4 }}>
                                <span>Прогресс до уровня 6</span>
                                <span>{Math.round((MOCK_USER.currentXP / MOCK_USER.maxXP) * 100)}%</span>
                            </div>
                            <XPBar current={MOCK_USER.currentXP} max={MOCK_USER.maxXP} />
                        </div>
                    </div>

                    <div>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                            <div style={{ color: "#fff", fontWeight: 700, display: "flex", alignItems: "center", gap: 8 }}>
                                <Target size={16} style={{ color: "#22d3ee" }} />Ежедневные квесты
                            </div>
                            <div style={{ fontSize: 12, padding: "4px 8px", borderRadius: 9999, background: "#06B6D422", color: "#06B6D4" }}>{earnedXP} / {totalXP} XP</div>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                            {quests.map(q => (
                                <button key={q.id} onClick={() => toggle(q.id)} style={{ background: q.done ? "#0D1A10" : "#161E35", border: `1px solid ${q.done ? "#10B98144" : "#1E293B"}`, borderRadius: 12, padding: 16, display: "flex", alignItems: "center", gap: 12, cursor: "pointer", textAlign: "left", width: "100%" }}>
                                    {q.done ? <CheckSquare size={18} style={{ color: "#34d399", flexShrink: 0 }} /> : <Square size={18} style={{ color: "#475569", flexShrink: 0 }} />}
                                    <span style={{ flex: 1, fontSize: 14, color: q.done ? "#64748b" : "#fff", textDecoration: q.done ? "line-through" : "none" }}>{q.text}</span>
                                    <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 9999, background: "#4F46E522", color: "#818CF8" }}>+{q.xp} XP</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    <div>
                        <div style={{ color: "#fff", fontWeight: 700, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
                            <Trophy size={16} style={{ color: "#facc15" }} />Достижения
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                            {ACHIEVEMENTS.map(a => (
                                <div key={a.id} style={{ background: a.earned ? "#161E35" : "#0F1422", border: `1px solid ${a.earned ? "#4F46E544" : "#1E293B"}`, borderRadius: 12, padding: 16, display: "flex", flexDirection: "column", gap: 8, opacity: a.earned ? 1 : 0.5 }}>
                                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                                        <div style={{ background: a.earned ? "#4F46E522" : "#1E293B", borderRadius: 8, padding: 8 }}>
                                            <a.icon size={16} style={{ color: a.earned ? "#818CF8" : "#475569" }} />
                                        </div>
                                        {a.earned
                                            ? <div style={{ fontSize: 11, padding: "2px 6px", borderRadius: 4, background: "#10B98122", color: "#10B981" }}>+{a.xp}</div>
                                            : <Lock size={12} style={{ color: "#475569", marginTop: 4 }} />}
                                    </div>
                                    <div style={{ fontSize: 12, fontWeight: 600, color: a.earned ? "#fff" : "#64748b", lineHeight: 1.3 }}>{a.title}</div>
                                    <div style={{ fontSize: 11, color: "#64748b", lineHeight: 1.4 }}>{a.desc}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function AlarmView({ blueLightFilter, setBlueLightFilter }) {
            const [wakeHour, setWakeHour] = useState(7);
            const [wakeMin, setWakeMin] = useState(0);
            const fmtWake = `${wakeHour.toString().padStart(2, "0")}:${wakeMin.toString().padStart(2, "0")}`;
            const sleepCycles = [1, 2, 3, 4, 5].map(cycles => {
                const totalMin = cycles * 90 + 15;
                let bedTotal = wakeHour * 60 + wakeMin - totalMin;
                if (bedTotal < 0) bedTotal += 1440;
                return { cycles, h: Math.floor(bedTotal / 60) % 24, m: (bedTotal % 60).toString().padStart(2, "0") };
            }).reverse();

            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                    <div style={{ background: "#161E35", border: "1px solid #1E293B", borderRadius: 16, padding: 20 }}>
                        <div style={{ color: "#fff", fontWeight: 700, marginBottom: 4, display: "flex", alignItems: "center", gap: 8 }}>
                            <Bell size={16} style={{ color: "#22d3ee" }} />Время подъёма
                        </div>
                        <div style={{ color: "#64748b", fontSize: 12, marginBottom: 16 }}>Установите желаемое время будильника</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                            {[{ label: "Часы", val: wakeHour, min: 4, max: 12, step: 1, set: setWakeHour },
                            { label: "Минуты", val: wakeMin, min: 0, max: 59, step: 15, set: setWakeMin }].map(({ label, val, min, max, step, set }, i) => (
                                <div key={label} style={{ flex: 1 }}>
                                    <label style={{ fontSize: 11, color: "#64748b", display: "block", marginBottom: 4 }}>{label}</label>
                                    <input type="range" min={min} max={max} step={step} value={val} onChange={e => set(+e.target.value)} style={{ width: "100%" }} />
                                    <div style={{ textAlign: "center", color: "#fff", fontFamily: "'DM Mono', monospace", fontWeight: 700, fontSize: 24, marginTop: 8 }}>{val.toString().padStart(2, "0")}</div>
                                </div>
                            ))}
                        </div>
                        <div style={{ background: "#0A0F1E", borderRadius: 12, padding: 12, textAlign: "center", fontSize: 36, fontWeight: 700, fontFamily: "'DM Mono', monospace", color: "#4F46E5", letterSpacing: 4 }}>{fmtWake}</div>
                    </div>

                    <div style={{ background: "#161E35", border: "1px solid #1E293B", borderRadius: 16, padding: 20 }}>
                        <div style={{ color: "#fff", fontWeight: 700, marginBottom: 4, display: "flex", alignItems: "center", gap: 8 }}>
                            <Moon size={16} style={{ color: "#818cf8" }} />Оптимальное время отбоя
                        </div>
                        <div style={{ color: "#64748b", fontSize: 12, marginBottom: 16 }}>
                            Чтобы встать в <span style={{ color: "#fff", fontWeight: 600 }}>{fmtWake}</span>, ложитесь спать:
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                            {sleepCycles.map((c, i) => (
                                <div key={c.cycles} style={{ display: "flex", alignItems: "center", gap: 12, background: i === 1 ? "#12192E" : "#0F1422", border: `1px solid ${i === 1 ? "#4F46E577" : "#1E293B"}`, borderRadius: 12, padding: "12px 16px" }}>
                                    <div style={{ background: i === 1 ? "#4F46E533" : "#1E293B", color: i === 1 ? "#818CF8" : "#475569", borderRadius: 8, padding: "4px 8px", fontSize: 12, fontWeight: 700 }}>{c.cycles} цикл{c.cycles > 1 ? "а" : ""}</div>
                                    <div style={{ flex: 1, textAlign: "center", color: "#fff", fontFamily: "'DM Mono', monospace", fontWeight: 700, fontSize: 20, letterSpacing: 2 }}>{c.h.toString().padStart(2, "0")}:{c.m}</div>
                                    <div style={{ fontSize: 12, color: "#64748b" }}>{c.cycles * 1.5}ч сна</div>
                                    {i === 1 && <div style={{ fontSize: 11, padding: "2px 8px", borderRadius: 9999, background: "#10B98122", color: "#10B981" }}>Лучший</div>}
                                </div>
                            ))}
                        </div>
                        <p style={{ fontSize: 12, color: "#64748b", marginTop: 12, lineHeight: 1.6 }}>* Основано на 90-минутных циклах сна + ~15 минут засыпания</p>
                    </div>

                    <div style={{ background: "#161E35", border: `1px solid ${blueLightFilter ? "#F59E0B44" : "#1E293B"}`, borderRadius: 16, padding: 20, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div>
                            <div style={{ color: "#fff", fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}>
                                <Eye size={16} style={{ color: blueLightFilter ? "#fb923c" : "#64748b" }} />Анти-синий свет
                            </div>
                            <div style={{ fontSize: 12, color: "#64748b", marginTop: 4 }}>Тёплый оверлей для снижения нагрузки</div>
                        </div>
                        <Toggle value={blueLightFilter} onChange={setBlueLightFilter} />
                    </div>

                    <div style={{ background: "#0D1F12", border: "1px solid #10B98144", borderRadius: 16, padding: 16, display: "flex", gap: 12 }}>
                        <Zap size={18} style={{ color: "#34d399", flexShrink: 0, marginTop: 2 }} />
                        <div>
                            <div style={{ color: "#34d399", fontWeight: 600, fontSize: 14, marginBottom: 4 }}>Умный будильник активен</div>
                            <div style={{ color: "#94a3b8", fontSize: 12, lineHeight: 1.6 }}>Будильник разбудит в оптимальный момент лёгкого сна в течение 30 минут до {fmtWake}.</div>
                        </div>
                    </div>
                </div>
            );
        }

        const NAV = [
            { id: "dashboard", label: "Главная", icon: Sun },
            { id: "analytics", label: "Аналитика", icon: TrendingUp },
            { id: "rpg", label: "Квесты", icon: Trophy },
            { id: "alarm", label: "Будильник", icon: Bell },
        ];

        function LoginScreen({ onLogin }) {
            return (
                <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: "#0A0F1E" }}>
                    <div style={{ position: "fixed", inset: 0, overflow: "hidden", pointerEvents: "none" }}>
                        {[...Array(40)].map((_, i) => (
                            <div key={i} style={{ position: "absolute", borderRadius: "50%", background: "#fff", width: Math.random() * 2 + 1, height: Math.random() * 2 + 1, top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`, opacity: Math.random() * 0.5 + 0.1 }} />
                        ))}
                    </div>
                    <div style={{ position: "relative", display: "flex", flexDirection: "column", alignItems: "center", gap: 32, maxWidth: 384, width: "100%" }}>
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12 }}>
                            <div style={{ width: 80, height: 80, borderRadius: 24, display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #4F46E5, #06B6D4)" }}>
                                <Moon size={36} style={{ color: "#fff" }} />
                            </div>
                            <h1 style={{ fontSize: 36, fontWeight: 800, color: "#fff", margin: 0 }}>Dream<span style={{ color: "#4F46E5" }}>Grade</span></h1>
                            <p style={{ color: "#94a3b8", fontSize: 14, textAlign: "center", lineHeight: 1.6, margin: 0 }}>Геймифицированный трекер сна.<br />Превратите каждую ночь в достижение.</p>
                        </div>
                        <div style={{ width: "100%", background: "#161E35", border: "1px solid #1E293B", borderRadius: 16, padding: 20, display: "flex", flexDirection: "column", gap: 16 }}>
                            {[["Электронная почта", "alex@dreamgrade.app", "#94a3b8"], ["Пароль", "••••••••", "#475569"]].map(([label, val, col]) => (
                                <div key={label} style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                    <label style={{ color: "#64748b", fontSize: 12 }}>{label}</label>
                                    <div style={{ background: "#0A0F1E", border: "1px solid #1E293B", borderRadius: 12, padding: "12px 16px", color: col, fontSize: 14 }}>{val}</div>
                                </div>
                            ))}
                            <button onClick={onLogin} style={{ width: "100%", background: "linear-gradient(135deg, #4F46E5, #06B6D4)", border: "none", borderRadius: 12, padding: "14px", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
                                Войти в систему снов
                            </button>
                        </div>
                        <div style={{ display: "flex", gap: 24, textAlign: "center" }}>
                            {[["12", "Дней подряд"], ["88", "Балл сна"], ["5", "Уровень"]].map(([v, l]) => (
                                <div key={l}>
                                    <div style={{ fontSize: 24, fontWeight: 700, color: "#fff", fontFamily: "'DM Mono', monospace" }}>{v}</div>
                                    <div style={{ fontSize: 12, color: "#64748b" }}>{l}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function DreamGrade() {
            const [authed, setAuthed] = useState(false);
            const [tab, setTab] = useState("dashboard");
            const [blueLightFilter, setBlueLightFilter] = useState(false);

            if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;

            return (
                <div style={{ minHeight: "100vh", background: "#0A0F1E", position: "relative" }}>
                    {blueLightFilter && <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 40, background: "rgba(255,140,0,0.12)", mixBlendMode: "multiply" }} />}
                    <div style={{ position: "sticky", top: 0, zIndex: 30, background: "#0A0F1Eee", borderBottom: "1px solid #1E293B", backdropFilter: "blur(12px)", display: "flex", alignItems: "center", padding: "12px 16px", gap: 12 }}>
                        <div style={{ width: 32, height: 32, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #4F46E5, #06B6D4)", flexShrink: 0 }}>
                            <Moon size={14} style={{ color: "#fff" }} />
                        </div>
                        <span style={{ color: "#fff", fontWeight: 800, flex: 1 }}>Dream<span style={{ color: "#4F46E5" }}>Grade</span></span>
                        <div style={{ display: "flex", gap: 8, fontSize: 12 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 8px", borderRadius: 9999, background: "#F59E0B22" }}>
                                <Flame size={11} style={{ color: "#fb923c" }} /><span style={{ color: "#fb923c", fontWeight: 600 }}>{MOCK_USER.streak}</span>
                            </div>
                            <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 8px", borderRadius: 9999, background: "#4F46E522" }}>
                                <Zap size={11} style={{ color: "#818cf8" }} /><span style={{ color: "#818cf8", fontWeight: 600 }}>{MOCK_USER.currentXP.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                    <div style={{ maxWidth: 512, margin: "0 auto", padding: "24px 16px 128px" }}>
                        {tab === "dashboard" && <Dashboard />}
                        {tab === "analytics" && <Analytics />}
                        {tab === "rpg" && <RPGView />}
                        {tab === "alarm" && <AlarmView blueLightFilter={blueLightFilter} setBlueLightFilter={setBlueLightFilter} />}
                    </div>
                    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 30, background: "#0A0F1Eee", borderTop: "1px solid #1E293B", backdropFilter: "blur(12px)", display: "flex" }}>
                        {NAV.map(n => {
                            const active = tab === n.id;
                            return (
                                <button key={n.id} onClick={() => setTab(n.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", padding: "12px 0", gap: 4, background: "none", border: "none", cursor: "pointer", color: active ? "#4F46E5" : "#475569" }}>
                                    <n.icon size={20} />
                                    <span style={{ fontSize: 11, fontWeight: 600 }}>{n.label}</span>
                                    {active && <div style={{ width: 24, height: 2, borderRadius: 9999, background: "#4F46E5" }} />}
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DreamGrade />);
    </script>
</body>
</html>
